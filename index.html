<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kargo — On-Demand Delivery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#F4F5F8; --surface:#FFFFFF; --surface-alt:#EEF0F4; --surface-raise:#FFFFFF;
  --ink:#12141C; --ink-soft:#5C6472; --ink-faint:#96A0B0;
  --navy:#0E1A33; --navy-soft:#E7EBF3;
  --accent:#FF5A2E; --accent-ink:#FFFFFF; --accent-soft:#FFE7DD; --accent-dim:#E64F26;
  --teal:#0AA398; --teal-soft:#DEF4F1;
  --warn:#EEA110; --warn-soft:#FCF0D6;
  --danger:#E5484D; --danger-soft:#FBE3E4;
  --border:#E4E7ED;
  --shadow-sm:0 1px 2px rgba(14,26,51,.05),0 1px 1px rgba(14,26,51,.04);
  --shadow-md:0 10px 26px rgba(14,26,51,.08),0 2px 6px rgba(14,26,51,.05);
  --shadow-lg:0 24px 56px rgba(14,26,51,.18),0 6px 14px rgba(14,26,51,.08);
  --radius-sm:12px; --radius-md:18px; --radius-lg:26px; --radius-pill:999px;
  --font-display:'Plus Jakarta Sans',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
[data-theme="dark"]{
  --bg:#080B12; --surface:#12161F; --surface-alt:#181D28; --surface-raise:#1A202C;
  --ink:#F2F4F8; --ink-soft:#9BA4B4; --ink-faint:#5E6779;
  --navy:#0E1A33; --navy-soft:#161F32;
  --accent:#FF6E42; --accent-ink:#0A0D13; --accent-soft:#2A1710; --accent-dim:#FF6E42;
  --teal:#22D6C9; --teal-soft:#0D2A29;
  --warn:#F2B705; --warn-soft:#2B2410;
  --danger:#FF5C61; --danger-soft:#2B1416;
  --border:#232A38;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 10px 26px rgba(0,0,0,.45);
  --shadow-lg:0 24px 56px rgba(0,0,0,.55);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:var(--font-body); background:#05070A;
  display:flex; align-items:center; justify-content:center; min-height:100vh;
  padding:28px; color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent); color:var(--accent-ink);}
button, input, textarea, select{font-family:inherit; color:inherit;}
button{cursor:pointer; border:none; background:none;}
input:focus, textarea:focus, select:focus, button:focus-visible{
  outline:2px solid var(--accent); outline-offset:2px;
}
a{color:inherit;}
::-webkit-scrollbar{width:0; height:0;}

/* ============ PHONE FRAME ============ */
.stage{display:flex; flex-direction:column; align-items:center; gap:14px;}
.rig-label{font-family:var(--font-mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#7A8296;}
.phone{
  width:390px; height:844px; background:var(--bg); border-radius:52px;
  padding:14px; box-shadow:0 0 0 12px #14161C, 0 40px 90px rgba(0,0,0,.55);
  position:relative; overflow:hidden;
}
.notch{
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  width:126px; height:32px; background:#14161C; border-radius:0 0 20px 20px; z-index:50;
}
.screen-frame{
  width:100%; height:100%; background:var(--bg); border-radius:38px; overflow:hidden;
  position:relative; display:flex; flex-direction:column;
}
.statusbar{
  height:48px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
  padding:0 28px 0 24px; font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--ink);
}
.statusbar .icons{display:flex; gap:5px; align-items:center;}
.app-body{flex:1 1 auto; overflow-y:auto; position:relative; scroll-behavior:smooth;}
.app-body::-webkit-scrollbar{display:none;}
#bottomNavSlot{flex:0 0 auto;}

/* ============ SCREEN TRANSITIONS ============ */
.screen{animation:slideIn .32s cubic-bezier(.22,.8,.36,1);}
@keyframes slideIn{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){ .screen{animation:none;} }

/* ============ TYPE ============ */
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; letter-spacing:-.01em; color:var(--ink);}
.mono{font-family:var(--font-mono);}
.eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); font-weight:600;}
.text-soft{color:var(--ink-soft);}
.text-faint{color:var(--ink-faint);}

/* ============ HEADER ============ */
.topbar{
  display:flex; align-items:center; gap:12px; padding:6px 20px 16px; flex:0 0 auto;
}
.topbar h2{font-size:19px;}
.icon-btn{
  width:40px; height:40px; border-radius:var(--radius-pill); background:var(--surface);
  display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm);
  color:var(--ink); flex:0 0 auto; transition:transform .15s cubic-bezier(.22,.8,.36,1), box-shadow .15s ease;
}
.icon-btn svg{width:20px; height:20px; display:block;}
.icon-btn:active{transform:scale(.90);}
.icon-btn.accent{background:var(--accent); color:var(--accent-ink); box-shadow:0 6px 16px rgba(255,90,46,.35);}

/* ============ BUTTONS ============ */
.btn{
  height:52px; border-radius:var(--radius-md); font-family:var(--font-body); font-weight:600; font-size:15px;
  display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  transition:transform .12s cubic-bezier(.22,.8,.36,1), box-shadow .12s ease, opacity .12s ease, filter .12s ease;
  letter-spacing:-.01em;
}
.btn svg{width:19px; height:19px; flex:0 0 auto;}
.btn:active{transform:scale(.97); filter:brightness(.96);}
.btn-primary{background:linear-gradient(135deg, var(--accent), var(--accent-dim)); color:var(--accent-ink); box-shadow:0 12px 26px rgba(230,79,38,.32);}
.btn-primary:disabled{opacity:.4; box-shadow:none;}
.btn-dark{background:var(--navy); color:#fff;}
.btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--ink);}
.btn-ghost{background:var(--surface-alt); color:var(--ink);}
.btn-sm{height:40px; font-size:13px; border-radius:var(--radius-sm);}
.btn-danger-outline{background:transparent; border:1.5px solid var(--danger); color:var(--danger);}

/* ============ CARDS / SURFACES ============ */
.card{background:var(--surface); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); border:1px solid var(--border);}
.pad{padding:18px;}
.px{padding-left:20px; padding-right:20px;}

/* ============ FORM ELEMENTS ============ */
.field{margin-bottom:16px;}
.field label{display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:7px;}
.input, .textarea, .select{
  width:100%; background:var(--surface-alt); border:1.5px solid transparent; border-radius:var(--radius-sm);
  padding:13px 14px; font-size:14.5px; color:var(--ink); transition:border-color .15s ease, background .15s ease;
}
.input:focus, .textarea:focus, .select:focus{border-color:var(--accent); background:var(--surface);}
.input.err, .textarea.err{border-color:var(--danger); background:var(--danger-soft);}
.err-msg{font-size:12px; color:var(--danger); margin-top:6px; font-weight:500; display:none;}
.err-msg.show{display:block;}
.textarea{resize:none; min-height:84px;}
.input-icon-wrap{position:relative;}
.input-icon-wrap .input{padding-left:40px;}
.input-icon-wrap svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--ink-faint); pointer-events:none;}

/* ============ CHIPS ============ */
.chip-row{display:flex; gap:8px; flex-wrap:wrap;}
.chip{
  padding:9px 15px; border-radius:var(--radius-pill); background:var(--surface-alt); font-size:13px; font-weight:600;
  color:var(--ink-soft); border:1.5px solid transparent; transition:.15s ease; white-space:nowrap;
}
.chip.active{background:var(--ink); color:var(--bg); }
[data-theme="dark"] .chip.active{background:var(--accent); color:var(--accent-ink);}
.chip.accent-active.active{background:var(--accent); color:var(--accent-ink);}

/* ============ BOTTOM NAV ============ */
.bottomnav{
  flex:0 0 auto; display:flex; padding:8px 10px calc(env(safe-area-inset-bottom) + 10px);
  background:var(--surface); border-top:1px solid var(--border); gap:2px;
}
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  padding:7px 0 6px; color:var(--ink-faint); font-size:10.5px; font-weight:600; letter-spacing:.01em;
  position:relative; transition:color .18s ease;
}
.nav-item .nav-ico{
  width:26px; height:22px; display:flex; align-items:center; justify-content:center; border-radius:11px;
  transition:background .18s ease, transform .18s cubic-bezier(.22,.8,.36,1);
}
.nav-item svg{width:22px; height:22px; display:block;}
.nav-item.active{color:var(--accent);}
.nav-item.active .nav-ico{background:var(--accent-soft); transform:translateY(-1px);}
.nav-item:active .nav-ico{transform:scale(.88);}

/* ============ MISC ============ */
.divider{height:1px; background:var(--border); margin:16px 0;}
.badge{font-size:11px; font-weight:700; padding:4px 9px; border-radius:var(--radius-pill); display:inline-flex; align-items:center; gap:4px;}
.badge-teal{background:var(--teal-soft); color:var(--teal);}
.badge-warn{background:var(--warn-soft); color:#8a6600;}
[data-theme="dark"] .badge-warn{color:var(--warn);}
.badge-danger{background:var(--danger-soft); color:var(--danger);}
.badge-accent{background:var(--accent-soft); color:var(--accent);}
.avatar{
  width:44px; height:44px; border-radius:var(--radius-pill); background:linear-gradient(135deg, var(--navy), #1B2C52); color:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:15px; flex:0 0 auto;
  letter-spacing:.01em;
}
.row{display:flex; align-items:center;}
.between{justify-content:space-between;}
.gap-8{gap:8px;} .gap-10{gap:10px;} .gap-12{gap:12px;} .gap-14{gap:14px;} .gap-16{gap:16px;}
.mt-8{margin-top:8px;} .mt-12{margin-top:12px;} .mt-16{margin-top:16px;} .mt-20{margin-top:20px;} .mt-24{margin-top:24px;}
.mb-8{margin-bottom:8px;} .mb-12{margin-bottom:12px;} .mb-16{margin-bottom:16px;}
.tap{transition:transform .12s ease;} .tap:active{transform:scale(.97);}
.stars{display:flex; gap:3px; color:var(--warn);}
.spinner{
  width:16px; height:16px; border-radius:50%; border:2.5px solid rgba(255,255,255,.35); border-top-color:currentColor;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{
  position:absolute; bottom:100px; left:20px; right:20px; background:var(--ink); color:var(--bg);
  padding:14px 16px; border-radius:var(--radius-sm); box-shadow:var(--shadow-lg); font-size:13.5px; font-weight:600;
  display:flex; align-items:center; gap:10px; z-index:200; animation:toastIn .3s cubic-bezier(.22,.8,.36,1);
}
@keyframes toastIn{from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);}}

/* ============ SPLASH ============ */
.splash{
  height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  background:
    radial-gradient(circle at 50% 32%, rgba(255,90,46,.20), transparent 55%),
    linear-gradient(165deg, #0E1A33 0%, #0A1226 60%, #070B16 100%);
  position:relative; overflow:hidden;
}
.splash-grid{position:absolute; inset:0; opacity:.5; pointer-events:none;}
.splash-mark{
  width:88px; height:88px; position:relative; z-index:2;
  animation:markPop .8s cubic-bezier(.22,.9,.30,1.35);
  filter:drop-shadow(0 18px 40px rgba(255,90,46,.35));
}
@keyframes markPop{from{transform:scale(.5); opacity:0;} to{transform:scale(1); opacity:1;}}
.splash-word{
  font-family:var(--font-display); font-size:23px; font-weight:800; color:#fff; letter-spacing:.02em;
  position:relative; z-index:2; opacity:0; animation:fadeUp .6s ease .35s forwards;
}
@keyframes fadeUp{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
.splash-loader{display:flex; gap:6px; margin-top:6px; position:relative; z-index:2; opacity:0; animation:fadeUp .6s ease .55s forwards;}
.splash-loader i{width:6px; height:6px; border-radius:50%; background:var(--accent); animation:dotPulse 1.1s ease-in-out infinite;}
.splash-loader i:nth-child(2){animation-delay:.15s;} .splash-loader i:nth-child(3){animation-delay:.3s;}
@keyframes dotPulse{0%,80%,100%{opacity:.25; transform:scale(.75);} 40%{opacity:1; transform:scale(1);}}

/* ============ AUTH ============ */
.authwrap{padding:34px 24px 24px; height:100%; display:flex; flex-direction:column;}
.auth-tabs{display:flex; background:var(--surface-alt); border-radius:var(--radius-pill); padding:4px; margin-bottom:26px;}
.auth-tab{flex:1; text-align:center; padding:11px 0; border-radius:var(--radius-pill); font-weight:700; font-size:13.5px; color:var(--ink-soft);}
.auth-tab.active{background:var(--surface); color:var(--ink); box-shadow:var(--shadow-sm);}
.social-row{display:flex; gap:10px; margin-top:14px;}
.social-btn{flex:1; height:48px; border-radius:var(--radius-sm); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; gap:8px;}
.or-divider{display:flex; align-items:center; gap:10px; margin:20px 0; color:var(--ink-faint); font-size:12px; font-weight:600;}
.or-divider::before, .or-divider::after{content:''; flex:1; height:1px; background:var(--border);}

/* ============ ROUTE MAP SIGNATURE ============ */
.route-preview{
  position:relative; height:168px; border-radius:var(--radius-md); overflow:hidden; background:
  radial-gradient(circle at 15% 20%, rgba(230,79,38,.12), transparent 45%),
  radial-gradient(circle at 85% 80%, rgba(11,165,160,.14), transparent 45%), var(--surface-alt);
  border:1px solid var(--border);
}
.route-preview svg{width:100%; height:100%; display:block;}
.route-grid line{stroke:var(--border); stroke-width:1;}
.route-path{fill:none; stroke:var(--ink-faint); stroke-width:2.5; stroke-dasharray:7 7; }
.route-path.animate{ animation:dashmove 1.4s linear infinite; }
@keyframes dashmove{to{stroke-dashoffset:-28;}}
.route-dot-a{fill:var(--accent);} .route-dot-b{fill:var(--teal);}
.route-pulse{fill:none; stroke:var(--teal); stroke-width:2; opacity:.6; animation:pulseRing 1.8s ease-out infinite;}
@keyframes pulseRing{0%{r:6; opacity:.7;}100%{r:22; opacity:0;}}
.rider-marker{ offset-path:path('M40,120 C90,40 210,150 300,60'); animation:none; }

/* ============ TIMELINE ============ */
.timeline{position:relative; padding-left:6px;}
.tl-item{display:flex; gap:14px; position:relative; padding-bottom:26px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item::before{
  content:''; position:absolute; left:11px; top:26px; bottom:0; width:2px; background:var(--border);
}
.tl-item:last-child::before{display:none;}
.tl-dot{
  width:24px; height:24px; border-radius:50%; background:var(--surface-alt); border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center; flex:0 0 auto; z-index:2; transition:.25s ease;
}
.tl-item.done .tl-dot{background:var(--teal); border-color:var(--teal); color:#fff;}
.tl-item.done::before{background:var(--teal);}
.tl-item.current .tl-dot{background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 0 5px var(--accent-soft);}
.tl-title{font-weight:700; font-size:14px;}
.tl-item.current .tl-title{color:var(--accent);}
.tl-item:not(.done):not(.current) .tl-title{color:var(--ink-faint);}
.tl-time{font-size:11.5px; color:var(--ink-faint); font-family:var(--font-mono);}

/* ============ WIZARD ============ */
.wizard-dots{display:flex; gap:6px; padding:0 20px 14px;}
.wdot{height:4px; flex:1; border-radius:2px; background:var(--border);}
.wdot.done{background:var(--teal);}
.wdot.active{background:var(--accent);}
.footer-bar{padding:14px 20px calc(env(safe-area-inset-bottom) + 14px); background:var(--surface); border-top:1px solid var(--border); flex:0 0 auto;}
.footer-bar.split{display:flex; gap:10px;}

/* ============ VEHICLE CARD ============ */
.vcard{display:flex; align-items:center; gap:14px; padding:14px; border-radius:var(--radius-md); border:1.5px solid var(--border); background:var(--surface); margin-bottom:10px; transition:.15s ease;}
.vcard.selected{border-color:var(--accent); background:var(--accent-soft);}
.vcard .vicon{width:52px; height:52px; border-radius:14px; background:var(--surface-alt); display:flex; align-items:center; justify-content:center; flex:0 0 auto; color:var(--ink);}
.vcard.selected .vicon{background:var(--accent); color:var(--accent-ink);}

/* ============ EMPTY STATES ============ */
.empty{display:flex; flex-direction:column; align-items:center; text-align:center; padding:60px 30px; gap:12px; color:var(--ink-soft);}
.empty .emoji{font-size:38px;}

/* ============ CHAT ============ */
.bubble{max-width:76%; padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.4; margin-bottom:8px;}
.bubble.them{background:var(--surface-alt); border-bottom-left-radius:4px; align-self:flex-start;}
.bubble.me{background:var(--accent); color:var(--accent-ink); border-bottom-right-radius:4px; align-self:flex-end; margin-left:auto;}
.bubble-time{font-size:10px; color:var(--ink-faint); margin-top:2px;}

/* ============ SWITCH ============ */
.switch{width:44px; height:26px; border-radius:var(--radius-pill); background:var(--border); position:relative; flex:0 0 auto; transition:.2s ease;}
.switch.on{background:var(--accent);}
.switch i{position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s ease; box-shadow:var(--shadow-sm);}
.switch.on i{left:21px;}

/* Utility */
.flex1{flex:1;} .relative{position:relative;} .hidden{display:none !important;}
.sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);}
</style>
</head>
<body>
<div class="stage">
  <div class="rig-label">KARGO — DELIVERY, REIMAGINED</div>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen-frame" id="screenFrame">
      <div class="statusbar" id="statusbar">
        <span id="clock">9:41</span>
        <div class="icons">
          <svg width="17" height="10" viewBox="0 0 17 10" fill="none"><rect x="0" y="6" width="3" height="4" rx="0.5" fill="currentColor"/><rect x="4.5" y="4" width="3" height="6" rx="0.5" fill="currentColor"/><rect x="9" y="2" width="3" height="8" rx="0.5" fill="currentColor"/><rect x="13.5" y="0" width="3" height="10" rx="0.5" fill="currentColor"/></svg>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><path d="M7.5 11C9.5 11 11.3 10.2 12.7 8.8L11.3 7.4C10.2 8.5 8.9 9 7.5 9C6.1 9 4.8 8.5 3.7 7.4L2.3 8.8C3.7 10.2 5.5 11 7.5 11ZM7.5 6.5C8.5 6.5 9.4 6.1 10.1 5.4L8.7 4C8.4 4.3 8 4.5 7.5 4.5C7 4.5 6.6 4.3 6.3 4L4.9 5.4C5.6 6.1 6.5 6.5 7.5 6.5ZM7.5 2C10 2 12.3 3 14 4.7L15 3.7C13 1.7 10.4 0.5 7.5 0.5C4.6 0.5 2 1.7 0 3.7L1 4.7C2.7 3 5 2 7.5 2Z" fill="currentColor"/></svg>
          <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="15" height="7" rx="1.3" fill="currentColor"/><rect x="21.5" y="3.5" width="1.5" height="4" rx="0.7" fill="currentColor"/></svg>
        </div>
      </div>
      <div class="app-body" id="appBody"></div>
      <div id="bottomNavSlot"></div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   KARGO — INTERACTIVE PROTOTYPE
   Single-file SPA. All data is mocked & in-memory (no network,
   no localStorage — per artifact constraints).
   ============================================================ */

/* ---------- BRAND LOGO ---------- */
let _logoUid = 0;
function Logo(size=88){
  const id = 'lg' + (_logoUid++);
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="${id}" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#FF7A45"/>
        <stop offset="1" stop-color="#E64F26"/>
      </linearGradient>
    </defs>
    <rect x="1" y="1" width="98" height="98" rx="26" fill="url(#${id})"/>
    <path d="M30 26v48" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <path d="M30 50 55 26M30 50l25 24" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M61 50h9" stroke="#fff" stroke-width="9" stroke-linecap="round" opacity=".92"/>
  </svg>`;
}

/* ---------- HELPERS ---------- */
function fmt(n){ return '₱' + n.toLocaleString('en-PH', {minimumFractionDigits:0}); }
function el(id){ return document.getElementById(id); }
function pushHistory(s){ if(S.history[S.history.length-1] !== s) S.history.push(s); }

function go(screen, opts={}){
  if(opts.push !== false) pushHistory(S.screen);
  S.screen = screen;
  render();
  el('appBody').scrollTop = 0;
}
function goBack(){
  const prev = S.history.pop();
  S.screen = prev || 'home';
  render();
}
function toast(msg){
  clearTimeout(S.toastTimer);
  const old = document.querySelector('.toast'); if(old) old.remove();
  const t = document.createElement('div');
  t.className='toast';
  t.innerHTML = `<span style="color:var(--teal)">${I.checkCircle}</span><span>${msg}</span>`;
  document.getElementById('screenFrame').appendChild(t);
  S.toastTimer = setTimeout(()=>t.remove(), 2600);
}
function toggleTheme(){
  S.theme = S.theme === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', S.theme);
  render();
}
function validate(rules){
  let ok = true;
  rules.forEach(r=>{
    const inputEl = el(r.id), errEl = el(r.id+'Err');
    const valid = r.test();
    if(!valid){ ok = false; if(inputEl) inputEl.classList.add('err'); if(errEl) errEl.classList.add('show'); }
    else { if(inputEl) inputEl.classList.remove('err'); if(errEl) errEl.classList.remove('show'); }
  });
  return ok;
}

function Topbar(title, {back=false, right=null, big=false} = {}){
  return `<div class="topbar">
    ${back ? `<button class="icon-btn" onclick="goBack()">${I.back}</button>` : ''}
    <h2 style="flex:1; ${big?'font-size:24px;':''}">${title}</h2>
    ${right || ''}
  </div>`;
}
function BottomNav(active){
  const items = [
    {id:'home', label:'Home', icon:I.home},
    {id:'history', label:'Activity', icon:I.activity},
    {id:'wallet', label:'Wallet', icon:I.wallet},
    {id:'profile', label:'Profile', icon:I.profile},
  ];
  return `<div class="bottomnav">
    ${items.map(it=>`<button class="nav-item ${active===it.id?'active':''}" onclick="go('${it.id}', {push:false}); S.history=[];"><span class="nav-ico">${it.icon}</span><span>${it.label}</span></button>`).join('')}
  </div>`;
}

function Stars(rating, size=13){
  const full = Math.floor(rating), frac = rating - full;
  let s = '';
  for(let i=0;i<5;i++){ s += `<span style="width:${size}px;height:${size}px;opacity:${i<full?1:(i===full&&frac>0.4?0.6:0.25)}">${I.star}</span>`; }
  return `<span class="stars">${s}</span>`;
}

function submitAuth(){
  const isLogin = S.authTab === 'login';
  let ok = true;
  const btn = el('authSubmitBtn');
  if(isLogin){
    ok = validate([
      {id:'loginEmail', test:()=>/^\S+@\S+\.\S+$/.test(el('loginEmail').value)},
      {id:'loginPass', test:()=>el('loginPass').value.length>=8},
    ]);
  } else {
    ok = validate([
      {id:'regName', test:()=>el('regName').value.trim().length>2},
      {id:'regPhone', test:()=>/^\+?\d{10,13}$/.test(el('regPhone').value.replace(/\s/g,''))},
      {id:'regEmail', test:()=>/^\S+@\S+\.\S+$/.test(el('regEmail').value)},
      {id:'regPass', test:()=>el('regPass').value.length>=8},
    ]);
  }
  if(!ok) return;
  btn.innerHTML = `<span class="spinner"></span> ${isLogin?'Signing in…':'Creating account…'}`;
  btn.disabled = true;
  setTimeout(()=>{ S.history=[]; go('home',{push:false}); toast(isLogin? 'Welcome back, Alex!' : 'Account created — welcome to Kargo!'); }, 1000);
}

function Screen_booking(){
  const b = S.booking;

  const titles = {1:'Delivery route', 2:'Contact details', 3:'What are you sending?', 4:'Choose a vehicle', 5:'Review & confirm'};
  return `<div class="screen" style="height:100%; display:flex; flex-direction:column;">
    ${Topbar(titles[b.step], {back:true})}
    <div class="wizard-dots">
      ${[1,2,3,4,5].map(n=>`<div class="wdot ${b.step>n?'done':b.step===n?'active':''}"></div>`).join('')}

    <div class="px flex1" style="overflow-y:auto; padding-bottom:14px;">
      ${steps[b.step]()}
    </div>
    <div class="footer-bar split">
      ${b.step>1 ? `<button class="btn btn-outline" style="width:auto; padding:0 22px;" onclick="bookingBack()">Back</button>` : ''}

    </div>
  </div>`;
}
function bookingBack(){ S.booking.step--; render(); }
function bookingNext(){
  const b = S.booking;
  if(b.step===1){
    const ok = validate([
      {id:'pickupInput', test:()=>b.pickup.trim().length>4},
      {id:'dropoffInput', test:()=>b.dropoff.trim().length>4},
    ]);
    if(!ok) return;
  }
  if(b.step===2){
    const ok = validate([
      {id:'senderNameInput', test:()=>b.senderName.trim().length>2},
      {id:'senderPhoneInput', test:()=>/^\+?\d{10,13}$/.test(b.senderPhone.replace(/\s/g,''))},
      {id:'recipientNameInput', test:()=>b.recipientName.trim().length>2},
      {id:'recipientPhoneInput', test:()=>/^\+?\d{10,13}$/.test(b.recipientPhone.replace(/\s/g,''))},
    ]);
    if(!ok) return;
  }
  if(b.step===3){
    const ok = validate([
      {id:'itemDescInput', test:()=>b.itemDesc.trim().length>2},
      {id:'categorySelectErrTarget', test:()=>!!b.category},
    ]);
    if(!ok) return;
  }
  if(b.step===4 && !b.vehicle){ toast('Please select a vehicle type'); return; }
  if(b.step===5){ confirmBooking(); return; }
  b.step++; render();
}

function confirmBooking(){

  const discount = b.promo ? Math.min(50, Math.round(fare*0.1)) : 0;
  S.activeOrder = {
    id: 'KG-' + Math.floor(80000+Math.random()*9999),

    date: 'Jul 9, 2026',

  S.history=[];
  go('finding',{push:false});

    if(!S.activeOrder) { clearInterval(stageTimer); return; }
    if(S.activeOrder.stage < STAGES.length-1){
      S.activeOrder.stage++;
      if(S.screen==='tracking') render();
      if(S.activeOrder.stage===STAGES.length-1){
        clearInterval(stageTimer);
        toast('Delivered! Please rate your rider.');

      <div class="card pad mb-20" style="display:flex; align-items:center; gap:14px;">
        <div class="avatar" style="width:56px; height:56px; font-size:18px;">${S.user.initials}</div>
        <div class="flex1"><div style="font-weight:700; font-size:16px;">${S.user.name}</div><div style="font-size:12px; color:var(--ink-faint);">${S.user.phone}</div><div style="font-size:12px; color:var(--ink-faint);">${S.user.email}</div></div>
        <button class="icon-btn" onclick="toast('Edit profile form opened')">${I.edit}</button>
      </div>

      <div class="card mb-16" style="overflow:hidden;">
        ${menu.map((m,i)=>`<button class="tap" style="width:100%; display:flex; align-items:center; gap:12px; padding:14px 16px; ${i<menu.length-1?'border-bottom:1px solid var(--border);':''}" onclick="go('${m.target}')">
          <span style="width:34px; height:34px; border-radius:11px; background:var(--surface-alt); color:var(--ink-soft); display:flex; align-items:center; justify-content:center; flex:0 0 auto;">${m.icon}</span><span class="flex1" style="text-align:left; font-weight:600; font-size:13.5px;">${m.label}</span><span style="color:var(--ink-faint);">${I.chevron}</span>
        </button>`).join('')}
      </div>

      <div class="card pad row between mb-16">
        <div class="row gap-10"><span style="color:var(--ink-soft);">${I.moon}</span><span style="font-weight:600; font-size:13.5px;">Dark mode</span></div>
        <div class="switch ${S.theme==='dark'?'on':''}" onclick="toggleTheme()"><i></i></div>
      </div>

      <button class="btn btn-outline" style="color:var(--danger); border-color:var(--danger);" onclick="doLogout()">
        <span style="display:flex; align-items:center; gap:8px;">${I.logout} Log Out</span>
      </button>
      <div style="height:16px;"></div>
    </div>
  </div>`;
}
function doLogout(){ S.activeOrder=null; S.history=[]; S.authTab='login'; go('auth',{push:false}); toast('Logged out successfully'); }

/* ---------- HELP CENTER ---------- */
function Screen_help(){
  const faqs = [
    {q:'How do I track my delivery?', a:'Open the Activity tab or tap the active delivery card on Home to see live rider location and status updates.'},
    {q:'What if my item is lost or damaged?', a:'Contact support immediately via chat below. All deliveries are covered by Kargo Protect for eligible items.'},
    {q:'Can I change the drop-off address after booking?', a:'You can request an address change by chatting with your rider before the item is picked up.'},
    {q:'How are delivery fees calculated?', a:'Fees are based on distance, vehicle type, and real-time demand in your area.'},
  ];
  return `<div class="screen">
    ${Topbar('Help Center', {back:true})}
    <div class="px">
      <div class="card pad mb-20" style="background:var(--danger-soft); border-color:var(--danger); display:flex; align-items:center; gap:14px;">
        <div style="width:42px; height:42px; border-radius:12px; background:var(--danger); color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 auto;">${I.siren}</div>
        <div class="flex1"><div style="font-weight:700; font-size:13.5px; color:var(--danger);">Emergency assistance</div><div style="font-size:11.5px; color:var(--ink-soft);">Get immediate help during an active delivery</div></div>
        <button class="btn btn-sm" style="width:auto; padding:0 16px; background:var(--danger); color:#fff;" onclick="triggerSOS()">SOS</button>
      </div>

      <button class="btn btn-dark mb-20" onclick="go('chat')">
        <span style="display:flex; align-items:center; gap:8px;">${I.chat} Chat with Support</span>
      </button>

      <h3 style="font-size:15px; margin-bottom:12px;">Frequently asked questions</h3>
      ${faqs.map((f,i)=>`
        <div class="card mb-10" style="overflow:hidden;">
          <button class="tap" style="width:100%; display:flex; justify-content:space-between; align-items:center; padding:15px 16px;" onclick="toggleFaq(${i})">
            <span style="font-weight:600; font-size:13.5px; text-align:left;">${f.q}</span>
            <span id="faqChevron${i}" style="color:var(--ink-faint); transition:transform .2s;">${I.chevron}</span>
          </button>
          <div id="faqBody${i}" class="hidden" style="padding:0 16px 16px; font-size:12.5px; color:var(--ink-soft); line-height:1.5;">${f.a}</div>
        </div>`).join('')}
    </div>
  </div>`;
}
function toggleFaq(i){
  const body = el('faqBody'+i), chev = el('faqChevron'+i);
  const open = !body.classList.contains('hidden');
  body.classList.toggle('hidden');
  chev.style.transform = open ? '' : 'rotate(90deg)';
}
function triggerSOS(){ toast('Emergency services notified — stay safe'); }

/* ============================================================
   ROUTER / RENDER
   ============================================================ */
const SCREENS = {
  splash: Screen_splash, auth: Screen_auth, home: Screen_home, notifications: Screen_notifications,
  booking: Screen_booking, finding: Screen_finding, tracking: Screen_tracking, chat: Screen_chat,
  rating: Screen_rating, receipt: Screen_receipt, history: Screen_history, wallet: Screen_wallet,
  addresses: Screen_addresses, promos: Screen_promos, profile: Screen_profile, help: Screen_help,
};
const NAV_SCREENS = {home:'home', history:'history', wallet:'wallet', profile:'profile'};

function render(){
  const body = el('appBody');
  body.innerHTML = SCREENS[S.screen] ? SCREENS[S.screen]() : Screen_home();
  const navSlot = el('bottomNavSlot');
  const hasBottomNav = Object.keys(NAV_SCREENS).includes(S.screen);
  navSlot.innerHTML = hasBottomNav ? BottomNav(NAV_SCREENS[S.screen] || S.screen) : '';
  document.getElementById('statusbar').style.color = 'var(--ink)';
}
function updateClock(){
  const d = new Date();
  let h = d.getHours()%12; if(h===0) h=12;
  const m = d.getMinutes().toString().padStart(2,'0');
  el('clock').textContent = `${h}:${m}`;
}
updateClock(); setInterval(updateClock, 30000);
document.documentElement.setAttribute('data-theme','light');
render();
</script>
</body>
</html>
